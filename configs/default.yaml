project:
  name: credit-risk-ml-system
  version: 0.1.0

data:
  path: ./data/cs-training.csv
  target: SeriousDlqin2yrs
  id_column: null
  timestamp_column: null

split:
  method: stratified
  seed: 42
  train_frac: 0.7
  val_frac: 0.15
  test_frac: 0.15

preprocess:
  numeric_impute: median
  categorical_impute: most_frequent
  encoding: onehot
  scaling: standard

model:
  type: lightgbm
  params:
    n_estimators: 1000
    learning_rate: 0.05
    num_leaves: 31
    min_child_samples: 20
    subsample: 0.8
    colsample_bytree: 0.8

imbalance:
  strategy: class_weight

threshold:
  strategy: f1
  min_precision: 0.8

costs:
  fn_cost: 5.0
  fp_cost: 1.0

calibration:
  enabled: false
  method: platt

registry:
  model_dir: ./artifacts/models

api:
  model_version_to_load: latest
